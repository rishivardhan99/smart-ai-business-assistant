version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartai-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-smartai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: smartai-backend-prod
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-smartai}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
    depends_on:
      - db
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: smartai-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata_prod:
